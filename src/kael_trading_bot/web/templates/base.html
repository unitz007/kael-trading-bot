<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kael Trading Bot{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/" class="navbar-logo">Kael Trading Bot</a>
        </div>
        <div class="navbar-nav">
            <a href="/training"
               class="nav-link{% if page == 'training' %} active{% endif %}">
                Training
            </a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Kael Trading Bot &copy; 2025</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
